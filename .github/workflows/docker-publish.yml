name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  test:
    # Stable display name for the branch-protection required check. Keep this
    # value fixed even if steps change, or required-check references break.
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: Test
        run: go test -race ./...

  docker:
    needs: test
    runs-on: ubuntu-latest
    # Only publish from the canonical repo on push/tag, never from PRs or forks.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest tracks the newest release (semver tag), not main. Pushes to
          # main get :main and :sha-… so they are testable but not :latest.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On a vX.Y.Z tag, publish a GitHub Release with auto-generated notes and
  # attach the static linux binaries (+ checksums) as downloadable assets.
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
      - name: Build static binaries
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o dist/tlsgate-linux-$arch .
          done
          (cd dist && sha256sum tlsgate-* > SHA256SUMS)
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/tlsgate-linux-amd64
            dist/tlsgate-linux-arm64
            dist/SHA256SUMS
