# Example deployment of tlsgate in front of a mail server (mailcow) listening
# on internal-only ports 10993 (IMAP) and 10465 (SMTPS).
#
#   docker compose up -d
#
# host networking is used so the localhost backends below are reachable and
# tlsgate sees real client source IPs. It is Linux-only; for a bridge network
# see the commented alternative at the bottom.
services:
  tlsgate:
    # Pin to a digest in production, e.g. ghcr.io/kilo666mj/tlsgate@sha256:...
    image: ghcr.io/kilo666mj/tlsgate:latest
    restart: unless-stopped
    network_mode: host
    command:
      - serve
      - --route=[::]:993=127.0.0.1:10993
      - --route=[::]:465=127.0.0.1:10465
      - --fingerprint=ja4
      # First-time setup: uncomment to record (not block) unknown clients while
      # you connect each device, then `tlsgate list` / `approve` and remove it.
      # - --allow-unknown
    volumes:
      # Persists the SQLite approval store and, if present, config.json for
      # blocked-range alerts (see the README).
      - tlsgate-data:/var/lib/tlsgate
    # Hardening: host networking widens blast radius, so strip everything the
    # proxy does not need. It only binds the privileged listen ports and writes
    # to its data volume.
    #
    # NOTE: with cap_drop ALL the root process loses CAP_DAC_OVERRIDE, so it must
    # actually own its data. A named volume (as below) is created root-owned and
    # correctly SELinux-labeled, so it works out of the box. If you switch to a
    # host bind mount, chown it to uid 0 AND add :Z to the mount (e.g.
    # ./data:/var/lib/tlsgate:Z) so SELinux relabels it.
    read_only: true
    tmpfs: ["/tmp"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]

volumes:
  tlsgate-data:

# Bridge-network alternative (works on non-Linux, but the backend must be
