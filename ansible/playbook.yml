---
- name: Deploy tlsgate proxy
  hosts: tlsgate
  become: true

  vars:
    goarch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: arm
    goarch: "{{ goarch_map[ansible_facts['architecture']] | default('amd64') }}"
    tlsgate_config_dir: /etc/tlsgate
    tlsgate_config: "{{ tlsgate_config_dir }}/config.json"

  tasks:
    - name: Build binary for linux/{{ goarch }}
      delegate_to: localhost
      become: false
      command:
        cmd: go build -o /tmp/tlsgate .
        chdir: "{{ playbook_dir }}/.."
      environment:
        GOOS: linux
        GOARCH: "{{ goarch }}"
      changed_when: true

    - name: Create tlsgate system user
      user:
        name: tlsgate
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/tlsgate
        create_home: false

    - name: Create data directory
      file:
        path: /var/lib/tlsgate
        state: directory
        mode: '0750'
        owner: tlsgate
        group: tlsgate

    - name: Create config directory
      file:
        path: "{{ tlsgate_config_dir }}"
        state: directory
        mode: '0750'
        owner: root
        group: tlsgate

    - name: Install gatehub server CA
      copy:
        src: "{{ control_plane_ca_src }}"
        dest: "{{ control_plane.ca }}"
        mode: '0640'
        owner: root
        group: tlsgate
      when:
        - control_plane is defined
        - control_plane.ca is defined
        - control_plane_ca_src is defined
      notify: Restart tlsgate

    - name: Deploy alert config
      template:
        src: config.json.j2
        dest: "{{ tlsgate_config }}"
        mode: '0640'
        owner: root
        group: tlsgate
      when: alert_ranges is defined or approve_ranges is defined or control_plane is defined
      notify: Restart tlsgate

    - name: Copy binary
      copy:
        src: /tmp/tlsgate
        dest: /usr/local/bin/tlsgate
        mode: '0755'
      notify: Restart tlsgate

    - name: Deploy systemd service
      template:
        src: tlsgate.service.j2
        dest: /etc/systemd/system/tlsgate.service
        mode: '0644'
      notify:
        - Reload systemd
        - Restart tlsgate

    - name: Enable and start tlsgate
      systemd:
        name: tlsgate
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Restart tlsgate
      systemd:
        name: tlsgate
        state: restarted
